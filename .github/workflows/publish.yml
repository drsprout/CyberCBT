name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Package HTML
        run: node scripts/package.js

      - name: Attach CyberCBT.html to release
        uses: softprops/action-gh-release@v2
        with:
          files: CyberCBT.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: publish to npm registry — requires PKG_TOKEN secret
  # (github.com/settings/tokens → classic → write:packages + read:packages + repo)
  publish-package:
    runs-on: ubuntu-latest
    needs: build-and-release
    if: ${{ secrets.PKG_TOKEN != '' }}
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@drsprout'
          always-auth: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Package HTML
        run: node scripts/package.js

      - name: Fix package metadata
        run: npm pkg fix

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}
        continue-on-error: true
