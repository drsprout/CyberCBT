name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Package HTML
        run: node scripts/package.js

      - name: Verify output
        run: |
          test -f CyberCBT.html && echo "✓ CyberCBT.html exists"
          SIZE=$(wc -c < CyberCBT.html)
          echo "✓ Size: ${SIZE} bytes"
          grep -q "CyberCBT" CyberCBT.html && echo "✓ Branding verified"
          grep -q "Security verification" CyberCBT.html && echo "✓ CAPTCHA verified"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberCBT
          path: CyberCBT.html
          retention-days: 30
